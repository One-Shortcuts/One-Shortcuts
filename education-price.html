  .screen { min-height: 100vh; padding-bottom: 48px; }

    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 0.5px solid var(--border);

  .header-top { display: flex; align-items: center; padding: 52px 16px 10px; gap: 10px; }
  .header-body { padding: 2px 16px 14px; }

  .header-body p { font-size: 14px; color: var(--text2); margin-top: 3px; }
  .back-btn { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: var(--surface2); border: none; border-radius: 50%; cursor: pointer; color: var(--accent); font-size: 20px; flex-shrink: 0; transition: opacity 0.15s; }
  .back-btn:active { opacity: 0.6; }
  .screen-label { font-size: 13px; color: var(--text2); }
  .tabs-scroll { overflow-x: auto; scrollbar-width: none; padding: 0 16px 12px; }
  .tabs-scroll::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 7px; width: max-content; }
  .tab { background: var(--surface2); color: var(--text2); border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.18s; font-family: var(--font); }
  .tab.active { background: var(--accent); color: #fff; }
  .col-header {
    display: grid;
    grid-template-columns: 1fr 85px 85px 80px 80px 65px;
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 132px;
    z-index: 90;
  }

  .col-header span:not(:first-child) { text-align: right; }
  .col-header .edu-col { color: var(--edu); }
  .col-header .ac-col { color: var(--accent); }
  .col-header .acedu-col { color: #5e5ce6; }
  .price-content { padding: 12px 12px 0; }
  .device-section { margin-bottom: 16px; }
  .device-name { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; padding: 6px 4px 8px; }
  .device-card { background: var(--surface2); border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); }
  .row { display: grid; grid-template-columns: 1fr 85px 85px 80px 80px 65px; align-items: center; padding: 11px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.12s; }
  .row:last-child { border-bottom: none; }
  .row:active { background: var(--surface3); }
  .row.open { background: rgba(10,132,255,0.06); }
  .row-label { font-size: 14px; font-weight: 500; letter-spacing: -0.2px; padding-right: 6px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
  .badge { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 6px; letter-spacing: 0.2px; }

  .crow:last-child { border-bottom: none; }
  .crow-name { font-size: 13px; color: var(--text2); }

  .footer { text-align: center; padding: 32px 16px; color: var(--text3); font-size: 12px; font-weight: 500; letter-spacing: -0.1px; }
  .lang-switcher {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: auto;
    padding: 4px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: rgba(255,255,255,0.04);

  .lang-btn {
    border: none;
    background: transparent;
    color: var(--text2);
    font: inherit;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
  }

  @media (max-width: 680px) {

    .row { grid-template-columns: repeat(2, 1fr); gap: 10px 12px; padding: 16px; }
    .row-label { grid-column: 1 / -1; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .price-col { text-align: left !important; display: flex; flex-direction: column; gap: 2px; }

  function getBaseUrl(file) {
    const href = window.location.href;
    if (href.includes('/raw/')) return href.split('/raw/')[0] + '/raw/' + file;
    if (href.startsWith('file:')) {
      const lastSlash = href.lastIndexOf('/');
      return lastSlash >= 0 ? href.slice(0, lastSlash + 1) + file : file;
    }
    if (href.startsWith('http://') || href.startsWith('https://')) {
      const path = window.location.pathname;
      const dir = path.endsWith('/') ? path : path.slice(0, path.lastIndexOf('/') + 1);
      return window.location.origin + dir + file;
    }
    return DEFAULT_RAW_BASE + file;

  function setPriceTab(tab) {
    activePriceTab = tab;
    document.querySelectorAll('#price-tabs .tab').forEach(t => t.classList.toggle('active', t.textContent.trim() === tab));
    renderPriceList();
  }

  function togglePriceRow(id) {
    const d = document.getElementById('pd' + id);
    const r = document.getElementById('pr' + id);
    if (!d) return;
    const wasOpen = d.classList.contains('open');
    document.querySelectorAll('.detail.open').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.row.open').forEach(el => el.classList.remove('open'));
    if (!wasOpen) {
      d.classList.add('open');
      r.classList.add('open');
    }
  }

  function renderPriceList() {
    const sections = priceData[activePriceTab];
    if (!sections) {
      document.getElementById('price-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">' + t('no_data') + '</div>';
      return;
    }
    let html = '';
    let id = 0;
    sections.forEach(section => {
      html += `<div class="device-section"><div class="device-name">${section.name}</div><div class="device-card">`;
      section.options.forEach(opt => {
        const saving = (opt.eduPrice && opt.price) ? opt.price - opt.eduPrice : null;
        const badges = [
          opt.cell ? `<span class="badge badge-cell">Cell</span>` : '',
          opt.nano ? `<span class="badge badge-nano">Nano</span>` : '',
        ].join('');
        html += `
          <div id="pr${id}" class="row" onclick="togglePriceRow(${id})">
            <div class="row-label">${opt.label} ${badges}</div>
            <div class="price-col" data-label="Regular"><div class="p-reg">${fmt(opt.price)}</div></div>
            <div class="price-col" data-label="EDU"><div class="${opt.eduPrice ? 'p-edu' : 'p-na'}">${fmt(opt.eduPrice)}</div></div>
            <div class="price-col" data-label="AC+"><div class="${opt.acPlus ? 'p-ac' : 'p-na'}">${fmt(opt.acPlus)}</div></div>
            <div class="price-col" data-label="AC+ EDU"><div class="${opt.acEdu ? 'p-acedu' : 'p-na'}">${fmt(opt.acEdu)}</div></div>
            <div class="price-col" data-label="Save"><div class="p-save">${saving ? '-' + fmt(saving) : '—'}</div></div>
          </div>
          <div id="pd${id}" class="detail">
            <div class="detail-grid">
              <div class="ditem"><div class="dlabel">Regular</div><div class="dval">${fmt(opt.price)}</div></div>
              <div class="ditem ditem-edu"><div class="dlabel">Education</div><div class="dval edu">${opt.eduPrice ? fmt(opt.eduPrice) : '—'}</div></div>
              ${saving ? `<div class="ditem ditem-save"><div class="dlabel">${t('you_save')}</div><div class="dval green">-${fmt(saving)}</div></div>` : ''}
              ${opt.acPlus ? `<div class="ditem ditem-ac"><div class="dlabel">${t('applecare')}</div><div class="dval blue">${fmt(opt.acPlus)}</div></div>` : ''}
              ${opt.acEdu ? `<div class="ditem ditem-ac"><div class="dlabel">${t('ac_edu')}</div><div class="dval blue">${fmt(opt.acEdu)}</div></div>` : ''}
              ${opt.adapterTo ? `
              <div class="ditem ditem-adapter">
                <div class="dlabel">${opt.adapterCost > 0 ? `${t('upgrade')} (${opt.adapterFrom} -> ${opt.adapterTo})` : t('adapter_options')}</div>
                <div class="dval" style="color:#5e5ce6;">${opt.adapterCost > 0 ? '+ ' + fmt(opt.adapterCost) : (opt.adapterFrom === '35W/70W' ? '35W / 70W' : opt.adapterFrom)}</div>
              </div>` : ''}
              ${opt.nanoPrice ? `<div class="ditem"><div class="dlabel">${t('nano_texture')}</div><div class="dval">${fmt(opt.nanoPrice)}</div></div>` : ''}
              ${opt.nanoEdu ? `<div class="ditem ditem-edu"><div class="dlabel">${t('nano_edu')}</div><div class="dval edu">${fmt(opt.nanoEdu)}</div></div>` : ''}
            </div>
            ${opt.nanoPrice ? `
            <div class="compare-table" style="margin-bottom: 10px;">
              <div class="ctitle">${t('with_nano')}</div>
              <div class="crow"><span class="crow-name">${t('regular_plus_nano')}</span><span class="crow-val">${fmt(opt.price + opt.nanoPrice)}</span></div>
              ${(opt.eduPrice && opt.nanoEdu) ? `<div class="crow"><span class="crow-name">${t('edu_plus_nano')}</span><span class="crow-val edu">${fmt(opt.eduPrice + opt.nanoEdu)}</span></div>` : ''}
            </div>` : ''}
            ${opt.acPlus ? `
            <div class="compare-table">
              <div class="ctitle">${t('with_ac')}</div>
              <div class="crow"><span class="crow-name">${t('regular_plus_ac')}</span><span class="crow-val">${fmt(opt.price + opt.acPlus)}</span></div>
              ${(opt.eduPrice && opt.acEdu) ? `<div class="crow"><span class="crow-name">${t('edu_plus_ac')}</span><span class="crow-val edu">${fmt(opt.eduPrice + opt.acEdu)}</span></div>` : ''}
              ${(opt.price && opt.acPlus && opt.eduPrice && opt.acEdu) ? `<div class="crow"><span class="crow-name">${t('total_saving')}</span><span class="crow-val green">-${fmt((opt.price + opt.acPlus) - (opt.eduPrice + opt.acEdu))}</span></div>` : ''}
            </div>` : ''}
          </div>`;
        id++;
      });
      html += '</div></div>';
    });
    document.getElementById('price-content').innerHTML = html;
  }

  function syncColHeader() {
    const h = document.getElementById('edu-header');
    const c = document.getElementById('col-header');
    if (h && c) c.style.top = h.offsetHeight + 'px';
  }

  window.addEventListener('load', function() {
    applyLang();
    renderPriceList();
    priceListInitialized = true;
    syncColHeader();
  });

  window.addEventListener('resize', syncColHeader);
</script>
