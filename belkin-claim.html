<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>One Shortcut - Claim Belkin Screen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #000;
    --surface: #111;
    --surface2: #1c1c1e;
    --surface3: #2c2c2e;
    --border: rgba(255,255,255,0.1);
    --text: #f5f5f7;
    --text2: #aeaeb2;
    --text3: #636366;
    --accent: #0a84ff;
    --orange: #ff9f0a;
    --radius: 14px;
    --font: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .screen { min-height: 100vh; padding-bottom: 48px; }
  .sticky-header {
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 0.5px solid var(--border);
  }
  .header-top { display: flex; align-items: center; padding: 52px 16px 10px; gap: 10px; }
  .header-body { padding: 2px 16px 14px; }
  .header-body h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header-body p { font-size: 14px; color: var(--text2); margin-top: 3px; }
  .back-btn { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: var(--surface2); border: none; border-radius: 50%; cursor: pointer; color: var(--accent); font-size: 20px; flex-shrink: 0; transition: opacity 0.15s; }
  .back-btn:active { opacity: 0.6; }
  .screen-label { font-size: 13px; color: var(--text2); }
  .qr-wrap { margin: 16px; background: var(--surface2); border-radius: 16px; padding: 28px 20px; border: 0.5px solid var(--border); text-align: center; }
  .qr-wrap h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .qr-wrap p { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
  #qrcode canvas, #qrcode img { width: 200px !important; height: 200px !important; border-radius: 12px; margin: 0 auto; }
  .btn-primary { display: block; width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; font-family: var(--font); margin-top: 20px; }
  .btn-primary:active { opacity: 0.8; }
  .footer { text-align: center; padding: 32px 16px; color: var(--text3); font-size: 12px; font-weight: 500; letter-spacing: -0.1px; }
  .lang-switcher {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: auto;
    padding: 4px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: rgba(255,255,255,0.04);
  }
  .lang-btn {
    border: none;
    background: transparent;
    color: var(--text2);
    font: inherit;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
  }
  .lang-btn.active { background: var(--surface3); color: var(--text); }
</style>
</head>
<body>
<div id="screen-belkin" class="screen">
  <div class="sticky-header">
    <div class="header-top">
      <button class="back-btn" onclick="goHome()">‹</button>
      <span class="screen-label" data-i18n="screen_label">Operation &amp; Process</span>
      <div class="lang-switcher" aria-label="Language switcher">
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">Eng</button>
        <button class="lang-btn" id="lang-th" onclick="setLang('th')">ไทย</button>
      </div>
    </div>
    <div class="header-body">
      <h1 data-i18n="title">Claim Belkin Screen</h1>
      <p data-i18n="subtitle">Screen protector replacement claim</p>
    </div>
  </div>
  <div class="qr-wrap">
    <h3 data-i18n="scan_title">Scan to open claim form</h3>
    <p data-i18n="scan_desc">Customer can scan this QR code with their camera.</p>
    <div id="qrcode"></div>
    <button class="btn-primary" onclick="openClaim()" data-i18n="open_form">Open Claim Form</button>
  </div>
  <div class="footer" data-i18n="footer_text">Belkin claim tool · One Shortcut</div>
</div>

<script>
  const DEFAULT_RAW_BASE = 'https://gist.githubusercontent.com/i3udokai/2a7cd2861cacaae67e8c6f8454fb1886/raw/';
  const I18N = {
    en: {
      title: 'One Shortcut - Claim Belkin Screen',
      screen_label: 'Operation & Process',
      title: 'Claim Belkin Screen',
      subtitle: 'Screen protector replacement claim',
      scan_title: 'Scan to open claim form',
      scan_desc: 'Customer can scan this QR code with their camera.',
      open_form: 'Open Claim Form',
      footer_text: 'Belkin claim tool · One Shortcut'
    },
    th: {
      title: 'One Shortcut - เคลมฟิล์ม Belkin',
      screen_label: 'งานปฏิบัติการ',
      title: 'เคลมฟิล์ม Belkin',
      subtitle: 'แบบฟอร์มเคลมสำหรับเปลี่ยนฟิล์มหน้าจอ',
      scan_title: 'สแกนเพื่อเปิดฟอร์มเคลม',
      scan_desc: 'ลูกค้าสามารถใช้กล้องสแกน QR code นี้ได้',
      open_form: 'เปิดฟอร์มเคลม',
      footer_text: 'เครื่องมือเคลม Belkin · One Shortcut'
    }
  };
  const LANG_KEY = 'one_shortcut_lang';
  function safeGetLang() {
    try { return localStorage.getItem(LANG_KEY) || 'en'; } catch (e) { return 'en'; }
  }
  function safeSetLang(lang) {
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
  }
  let currentLang = safeGetLang();
  const CLAIM_URL = 'https://belkin.my.salesforce-sites.com/caforms/AppleFormEnglish';

  function applyLang() {
    document.documentElement.lang = currentLang === 'th' ? 'th' : 'en';
    document.title = I18N[currentLang].title || 'One Shortcut - Claim Belkin Screen';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const value = I18N[currentLang][key];
      if (value) el.textContent = value;
    });
    document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
    document.getElementById('lang-th').classList.toggle('active', currentLang === 'th');
  }

  function setLang(lang) {
    currentLang = lang === 'th' ? 'th' : 'en';
    safeSetLang(currentLang);
    applyLang();
  }

  function getBaseUrl(file) {
    const href = window.location.href;
    if (href.includes('/raw/')) return href.split('/raw/')[0] + '/raw/' + file;
    if (href.startsWith('file:')) {
      const lastSlash = href.lastIndexOf('/');
      return lastSlash >= 0 ? href.slice(0, lastSlash + 1) + file : file;
    }
    return DEFAULT_RAW_BASE + file;
  }

  function openRemote(url) {
    fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.text())
      .then(html => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => {
        window.location.href = url;
      });
  }

  function goHome() {
    openRemote(getBaseUrl('staff-tool.html'));
  }

  function openClaim() {
    window.location.href = CLAIM_URL;
  }

  function initBelkinQR() {
    const el = document.getElementById('qrcode');
    if (!el || typeof QRCode === 'undefined') return;
    try {
      el.innerHTML = '';
      new QRCode(el, {
        text: CLAIM_URL,
        width: 200,
        height: 200,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      setTimeout(() => {
        el.querySelectorAll('canvas').forEach(c => c.remove());
        el.querySelectorAll('img').forEach((img, i) => { if (i > 0) img.remove(); });
      }, 100);
    } catch (e) {}
  }

  window.addEventListener('load', () => {
    applyLang();
    initBelkinQR();
  });
</script>
</body>
</html>
